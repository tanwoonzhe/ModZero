# docker-compose.prod.yml
# Production overlay — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Overrides development defaults for cloud / VPS deployment.

services:
  backend:
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-https://yourdomain.com}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://yourdomain.com}
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      CONNECTOR_BASE_URL: ${CONNECTOR_BASE_URL:-http://connector:8443}
      CONNECTOR_HOP_SECRET: ${CONNECTOR_HOP_SECRET}
    volumes: []  # Remove dev hot-reload mounts
    restart: always

  connector:
    environment:
      CONNECTOR_HOP_SECRET: ${CONNECTOR_HOP_SECRET}
    restart: always

  frontend:
    build:
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
    # TLS termination in prod. Mount certs read-only and use the
    # TLS-enabled nginx config. Generate certs locally with
    # scripts/gen-selfsigned-cert.sh for FYP demos.
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./frontend/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always

  db:
    restart: always
