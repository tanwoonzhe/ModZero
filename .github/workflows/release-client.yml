name: "Release Client App"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-electron:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: "--win"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Install client-app dependencies
        working-directory: ./client-app
        run: npm ci

      - name: Build and package Electron app
        working-directory: ./client-app
        run: npm run build:main && npm run package ${{ matrix.args }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: "ModZero Client v${{ github.ref_name }}"
          body: |
            ## ModZero Client Release

            ### Features
            - System tray integration for Windows
            - Real-time device compliance monitoring
            - Automatic sync with ModZero server
            - Trust score calculation

            ### Installation
            1. Download the `.exe` installer
            2. Run the installer
            3. The app will start and appear in your system tray
          draft: false
          prerelease: false
          files: client-app/release/**/*.exe
