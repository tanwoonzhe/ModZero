name: modzero

services:
  # ── PostgreSQL Database ──────────────────────────────────────────
  db:
    image: postgres:15
    env_file:
      - path: ../.env
        required: true
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      # pg_isready uses PGUSER/PGDATABASE which Postgres sets from POSTGRES_USER/POSTGRES_DB
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend (Controller) ────────────────────────────────
  backend:
    build: ../backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      # Provides DATABASE_URL, SECRET_KEY, INITIAL_SUPERUSER_*, etc.
      # Relative to this compose file's directory — works regardless of CWD.
      - path: ../.env
        required: true
    environment:
      # Only vars with safe compile-time defaults belong here.
      # Everything else (DATABASE_URL, SECRET_KEY, MS_*, AZURE_*, etc.)
      # comes from env_file above — do NOT add ${VAR} without a :- default
      # or it will resolve to empty string and silently override env_file.
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      CONNECTOR_BASE_URL: ${CONNECTOR_BASE_URL:-http://connector:8443}
      CONNECTOR_HOP_SECRET: ${CONNECTOR_HOP_SECRET:-dev-connector-hop-secret-change-me}
      CONNECTOR_TRANSPORT: ${CONNECTOR_TRANSPORT:-direct_http}
      # Connector proxy base URL for access session URLs.
      # Set to http://<connector-host>:8443 for cloud/LAN deployment.
      # Leave empty to fall back to modzero://access/{session_id} (Electron deep-link).
      DEMO_CONNECTOR_PROXY_BASE_URL: ${DEMO_CONNECTOR_PROXY_BASE_URL:-}
      # Server timezone — context score hour check uses this (datetime.now() reads TZ).
      # Set TIMEZONE in .env to override (e.g. TIMEZONE=UTC).
      TZ: ${TIMEZONE:-Asia/Kuala_Lumpur}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ../frontend/dist:/app/frontend/dist
      - ../backend/app:/app/app
      - ../backend/setup.sh:/app/setup.sh:ro

  # ── React Frontend (Dashboard) ──────────────────────────────────
  # NOTE: Build args (VITE_API_BASE etc.) are resolved from deploy/.env, NOT ../.env.
  # Run deploy/setup.sh first (creates deploy/.env → ../.env symlink) or use:
  #   docker compose --env-file ../.env build frontend
  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

  # ── Demo Internal Resource ──────────────────────────────────────
  # Simulates a private resource reachable only via the connector.
  # NOT published to the host — access only through /r/<slug>.
  intranet:
    image: nginx:alpine
    volumes:
      - ../legacy/intranet/index.html:/usr/share/nginx/html/index.html:ro
      - ../legacy/intranet/users.html:/usr/share/nginx/html/users.html:ro
      - ../legacy/intranet/admin.html:/usr/share/nginx/html/admin.html:ro
      - ../legacy/intranet/static:/usr/share/nginx/html/static:ro
      - ../legacy/intranet/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - private-net

  # ── Demo TLS terminator ──────────────────────────────────────────
  # Lets a ConnectorResource route use protocol=https against the AlphaTechs
  # demo target (a host-level plain-HTTP process on 127.0.0.1:8088, which has
  # no TLS listener of its own). Terminates TLS with a self-signed cert
  # (generate via legacy/scripts/gen-selfsigned-cert.sh -> ../certs/) and
  # forwards to the host in plain HTTP. Point the route at
  # target_host=127.0.0.1, target_port=8446, protocol=https.
  demo-tls:
    image: nginx:alpine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../certs:/etc/nginx/certs:ro
      - ../deploy/demo-tls.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8446:443"
    restart: unless-stopped

  # ── ModZero Connector ──────────────────────────────────────────
  # Set MODZERO_ENROLL_TOKEN in .env before starting the connector.
  # Start order: 1) docker compose up -d db backend frontend intranet
  #              2) create an enroll token in the admin UI
  #              3) add MODZERO_ENROLL_TOKEN=<token> to .env
  #              4) docker compose up -d connector
  connector:
    build: ../connector
    environment:
      MODZERO_CONTROLLER_URL: "http://backend:8000"
      MODZERO_ENROLL_TOKEN: "${MODZERO_ENROLL_TOKEN:-}"
      MODZERO_NETWORK: "demo-network"
      MODZERO_LABEL_HOSTNAME: "demo-connector"
      MODZERO_LABEL_DEPLOYED_BY: "docker-compose"
      MODZERO_CONNECTOR_LISTEN_PORT: "8443"
      MODZERO_INSECURE_SKIP_VERIFY: "true"
      CONNECTOR_HOP_SECRET: ${CONNECTOR_HOP_SECRET:-dev-connector-hop-secret-change-me}
    depends_on:
      - backend
      - intranet
    ports:
      - "8443:8443"
    volumes:
      - connector_data:/etc/modzero-connector
    restart: on-failure
    networks:
      - default
      - private-net

volumes:
  db_data:
  connector_data:

networks:
  default:
    driver: bridge
  private-net:
    driver: bridge
    internal: false
