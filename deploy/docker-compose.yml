name: modzero

services:
  # ── PostgreSQL Database ──────────────────────────────────────────
  db:
    image: postgres:15
    env_file:
      - path: ../.env
        required: true
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend (Controller) ────────────────────────────────
  backend:
    build: ../backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG: ${DEBUG}
      INITIAL_SUPERUSER_USERNAME: ${INITIAL_SUPERUSER_USERNAME}
      INITIAL_SUPERUSER_EMAIL: ${INITIAL_SUPERUSER_EMAIL}
      INITIAL_SUPERUSER_PASSWORD: ${INITIAL_SUPERUSER_PASSWORD}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      CONNECTOR_BASE_URL: ${CONNECTOR_BASE_URL:-http://connector:8443}
      CONNECTOR_HOP_SECRET: ${CONNECTOR_HOP_SECRET:-dev-connector-hop-secret-change-me}
      CONNECTOR_TRANSPORT: ${CONNECTOR_TRANSPORT:-direct_http}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ../frontend/dist:/app/frontend/dist
      - ../backend/app:/app/app
      - ../backend/setup.sh:/app/setup.sh:ro

  # ── React Frontend (Dashboard) ──────────────────────────────────
  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

  # ── Demo Internal Resource ──────────────────────────────────────
  # Simulates a private resource reachable only via the connector.
  # NOT published to the host — access only through /r/<slug>.
  intranet:
    image: nginx:alpine
    volumes:
      - ../legacy/intranet/index.html:/usr/share/nginx/html/index.html:ro
      - ../legacy/intranet/users.html:/usr/share/nginx/html/users.html:ro
      - ../legacy/intranet/admin.html:/usr/share/nginx/html/admin.html:ro
      - ../legacy/intranet/static:/usr/share/nginx/html/static:ro
      - ../legacy/intranet/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - private-net

  # ── ModZero Connector ──────────────────────────────────────────
  # Enrolls with the controller and proxies traffic to intranet.
  # Set MODZERO_ENROLL_TOKEN in .env before starting (generate via
  # the dashboard: Connectors → Deploy Connector).
  connector:
    build: ../connector
    environment:
      MODZERO_CONTROLLER_URL: "http://backend:8000"
      MODZERO_ENROLL_TOKEN: "${MODZERO_ENROLL_TOKEN:-}"
      MODZERO_NETWORK: "demo-network"
      MODZERO_LABEL_HOSTNAME: "demo-connector"
      MODZERO_LABEL_DEPLOYED_BY: "docker-compose"
      MODZERO_CONNECTOR_LISTEN_PORT: "8443"
      MODZERO_INSECURE_SKIP_VERIFY: "true"
      CONNECTOR_HOP_SECRET: ${CONNECTOR_HOP_SECRET:-dev-connector-hop-secret-change-me}
    depends_on:
      - backend
      - intranet
    ports:
      - "8443:8443"
    volumes:
      - connector_data:/etc/modzero-connector
    restart: unless-stopped
    networks:
      - default
      - private-net

volumes:
  db_data:
  connector_data:

networks:
  default:
    driver: bridge
  # private-net: only connector and private resources attach here.
  # Backend and frontend are NOT on this network.
  private-net:
    driver: bridge
    internal: false
