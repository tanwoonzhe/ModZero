version: "3.8"

services:
  # ── PostgreSQL Database ──────────────────────────────────────────
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend (Controller) ────────────────────────────────
  backend:
    build: ./backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG: ${DEBUG}
      # Initial superuser credentials
      INITIAL_SUPERUSER_USERNAME: ${INITIAL_SUPERUSER_USERNAME}
      INITIAL_SUPERUSER_EMAIL: ${INITIAL_SUPERUSER_EMAIL}
      INITIAL_SUPERUSER_PASSWORD: ${INITIAL_SUPERUSER_PASSWORD}
      # Azure credentials (optional)
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      # CORS origins (comma-separated, * for dev)
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      # Cloud / public URL configuration
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      # Backend -> connector hop
      CONNECTOR_BASE_URL: ${CONNECTOR_BASE_URL:-http://connector:8443}
      CONNECTOR_HOP_SECRET: ${CONNECTOR_HOP_SECRET:-dev-connector-hop-secret-change-me}
      # Phase 2B: connector transport (direct_http | wss_tunnel scaffold)
      CONNECTOR_TRANSPORT: ${CONNECTOR_TRANSPORT:-direct_http}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ./frontend/dist:/app/frontend/dist  # mount built frontend for serving static files
      - ./backend/app:/app/app  # mount backend code for hot reload
      - ./backend/setup.sh:/app/setup.sh:ro  # setup script served via /public/connector/setup.sh

  # ── React Frontend (Dashboard) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

  # ── Demo Internal Resource (simulates an independently running site) ──
  # The intranet is an internal-only service reachable ONLY on the
  # docker-compose network as http://intranet:80. It is intentionally
  # NOT published to the host, so employees cannot bypass ModZero by
  # opening http://localhost:2026 in the browser. The backend/connector
  # can still proxy to it because they share the same docker network.
  # Register it as a Resource with target_host=intranet target_port=80
  # and access it via the protected route /r/<slug>.
  intranet:
    image: nginx:alpine
    volumes:
      - ./intranet/index.html:/usr/share/nginx/html/index.html:ro
      - ./intranet/users.html:/usr/share/nginx/html/users.html:ro
      - ./intranet/admin.html:/usr/share/nginx/html/admin.html:ro
      - ./intranet/static:/usr/share/nginx/html/static:ro
      - ./intranet/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # No `ports:` mapping — internal-only by design.
    restart: unless-stopped
    networks:
      - private-net

  # ── ModZero Connector ──────────────────────────────────────────
  # For the demo, this connector enrolls with the controller and
  # proxies traffic to the intranet service above.
  #
  # IMPORTANT: You must first create an enroll token via the dashboard
  # (Connectors → Deploy Connector), then set MODZERO_ENROLL_TOKEN
  # in .env before starting this service.
  #
  # In production, connectors are deployed independently using:
  #   docker run ... modzero/connector:latest
  connector:
    build: ./connector
    environment:
      MODZERO_CONTROLLER_URL: "http://backend:8000"
      MODZERO_ENROLL_TOKEN: "${MODZERO_ENROLL_TOKEN:-}"
      MODZERO_NETWORK: "demo-network"
      MODZERO_LABEL_HOSTNAME: "demo-connector"
      MODZERO_LABEL_DEPLOYED_BY: "docker-compose"
      MODZERO_CONNECTOR_LISTEN_PORT: "8443"
      MODZERO_INSECURE_SKIP_VERIFY: "true"
      # Shared HMAC secret with the controller for /_modzero/forward hops
      CONNECTOR_HOP_SECRET: ${CONNECTOR_HOP_SECRET:-dev-connector-hop-secret-change-me}
    depends_on:
      - backend
      - intranet
    ports:
      - "8443:8443"
    volumes:
      - connector_data:/etc/modzero-connector
    restart: unless-stopped
    networks:
      - default
      - private-net

volumes:
  db_data:
  connector_data:

networks:
  default:
    driver: bridge
  # private-net: only `connector` and private resources (intranet) attach here.
  # Backend and frontend are NOT on this network, so they cannot reach
  # the intranet directly — only via the connector.
  private-net:
    driver: bridge
    internal: false
