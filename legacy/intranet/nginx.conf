server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 16m;

    # Demo route: simple HTML page
    location = /users {
        try_files /users.html =404;
        default_type text/html;
    }
    location = /admin {
        try_files /admin.html =404;
        default_type text/html;
    }

    # JSON API endpoint (tests Content-Type and absolute URLs in body)
    location = /api/status {
        default_type application/json;
        return 200 '{"ok":true,"service":"demo-intranet","version":"phase2"}';
    }

    # Static asset (tests path_prefix style routing)
    location /static/ {
        alias /usr/share/nginx/html/static/;
        access_log off;
        expires 1h;
    }

    # Redirect: tests Location header rewriting
    location = /redirect {
        return 302 /users;
    }
    # Absolute redirect — exercises absolute Location rewriting too
    location = /redirect-abs {
        return 302 http://intranet/users;
    }

    # Cookie-setting route — tests Set-Cookie path rewriting
    location = /set-cookie {
        add_header Set-Cookie "demo_session=abc123; Path=/; HttpOnly" always;
        add_header Set-Cookie "demo_pref=darkmode; Path=/users" always;
        default_type text/html;
        return 200 '<!doctype html><html><body><h1>Cookie set</h1><p>Two Set-Cookie headers issued: demo_session (Path=/) and demo_pref (Path=/users).</p><p><a href="/users">Go to users</a></p></body></html>';
    }

    # POST echo endpoint — tests form submission
    location = /api/echo {
        default_type application/json;
        if ($request_method !~ ^(POST|PUT)$) {
            return 405;
        }
        return 200 '{"echoed":true,"method":"POST"}';
    }

    # Health
    location = /healthz {
        default_type text/plain;
        return 200 'ok';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
