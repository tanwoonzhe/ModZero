<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ModZero — Connect</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; connect-src *;" />
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --muted: #94a3b8;
      --text: #e2e8f0;
      --accent: #6366f1;
      --accent-h: #4f46e5;
      --ok: #10b981;
      --err: #ef4444;
      --warn: #f59e0b;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
    }
    body { display: flex; align-items: center; justify-content: center; padding: 24px; }
    .wrap { width: 100%; max-width: 460px; }
    .brand { text-align: center; margin-bottom: 24px; }
    .brand .logo {
      width: 56px; height: 56px; border-radius: 14px;
      background: var(--accent); color: #fff; font-weight: 700; font-size: 28px;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 12px; box-shadow: 0 10px 25px rgba(99,102,241,.35);
    }
    .brand h1 { font-size: 22px; margin: 0 0 4px; }
    .brand p { color: var(--muted); margin: 0; font-size: 13px; }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 24px;
      box-shadow: 0 12px 32px rgba(0,0,0,.35);
    }
    label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 6px; text-transform: uppercase; letter-spacing: .5px; }
    label:first-child { margin-top: 0; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 10px 12px; font-size: 14px;
      background: #0b1220; color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,.2); }
    .row { display: flex; gap: 10px; margin-top: 18px; }
    button {
      flex: 1; padding: 11px 14px; font-size: 14px; font-weight: 600;
      border: 0; border-radius: 8px; cursor: pointer; transition: background .15s, opacity .15s;
    }
    button.primary { background: var(--accent); color: #fff; }
    button.primary:hover:not(:disabled) { background: var(--accent-h); }
    button.ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    button.ghost:hover:not(:disabled) { color: var(--text); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .status {
      margin-top: 16px; padding: 10px 12px; border-radius: 8px;
      font-size: 13px; line-height: 1.5; display: none;
    }
    .status.show { display: block; }
    .status.ok { background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.4); color: #6ee7b7; }
    .status.err { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.4); color: #fca5a5; }
    .status.info { background: rgba(99,102,241,.12); border: 1px solid rgba(99,102,241,.4); color: #c7d2fe; }
    .tabs { display: flex; gap: 6px; margin: 0 0 14px; padding: 4px; background: #0b1220; border-radius: 10px; }
    .tab { flex: 1; text-align: center; padding: 7px 10px; font-size: 13px; cursor: pointer; border-radius: 7px; color: var(--muted); }
    .tab.active { background: var(--card); color: var(--text); }
    .help { color: var(--muted); font-size: 12px; margin-top: 8px; }
    .help code { background: #0b1220; padding: 1px 5px; border-radius: 3px; }
    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .8s linear infinite; vertical-align: -2px;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="logo">M</div>
      <h1>Connect to ModZero</h1>
      <p>Enter your ModZero server and credentials to enroll this device.</p>
    </div>
    <div class="card">
      <label for="url">ModZero Server URL</label>
      <input id="url" type="text" placeholder="http://localhost:8000" autocomplete="off" />

      <div class="tabs" role="tablist">
        <div class="tab active" data-mode="login" role="tab">Login</div>
        <div class="tab" data-mode="token" role="tab">Enrollment Token</div>
      </div>

      <div id="pane-login">
        <label for="username">Username</label>
        <input id="username" type="text" autocomplete="username" placeholder="admin" />
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" />
      </div>

      <div id="pane-token" style="display:none">
        <label for="token">Enrollment Token</label>
        <input id="token" type="text" placeholder="Paste the token issued by your admin" autocomplete="off" />
      </div>

      <div class="row">
        <button id="connect" class="primary">Connect</button>
        <button id="test" class="ghost">Test connection</button>
      </div>

      <div id="status" class="status"></div>
      <div class="help">
        Connection details are stored locally in your user profile and never sent anywhere except the ModZero server above.
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const urlEl = $("url");
    const userEl = $("username");
    const passEl = $("password");
    const tokenEl = $("token");
    const statusEl = $("status");
    const connectBtn = $("connect");
    const testBtn = $("test");
    let mode = "login";

    function setStatus(kind, text) {
      statusEl.className = "status show " + kind;
      statusEl.innerHTML = text;
    }
    function busy(on, label) {
      connectBtn.disabled = on;
      testBtn.disabled = on;
      connectBtn.textContent = on ? "" : "Connect";
      if (on) {
        connectBtn.innerHTML = '<span class="spinner"></span>' + (label || "Connecting…");
      }
    }

    document.querySelectorAll(".tab").forEach((t) => {
      t.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((x) => x.classList.remove("active"));
        t.classList.add("active");
        mode = t.dataset.mode;
        $("pane-login").style.display = mode === "login" ? "block" : "none";
        $("pane-token").style.display = mode === "token" ? "block" : "none";
      });
    });

    function normaliseUrl(raw) {
      let v = (raw || "").trim();
      if (!v) return "";
      if (!/^https?:\/\//i.test(v)) v = "http://" + v;
      return v.replace(/\/+$/, "");
    }

    async function probeHealth(baseUrl) {
      // Try /health (mounted at root) first, then /api/health as fallback.
      const candidates = [baseUrl + "/health", baseUrl + "/api/health"];
      let lastErr;
      for (const url of candidates) {
        try {
          const ctrl = new AbortController();
          const to = setTimeout(() => ctrl.abort(), 4000);
          const r = await fetch(url, { signal: ctrl.signal });
          clearTimeout(to);
          if (r.ok) return { ok: true, url };
          lastErr = `${url} → HTTP ${r.status}`;
        } catch (e) {
          lastErr = `${url} → ${e.message || e.name}`;
        }
      }
      return { ok: false, error: lastErr };
    }

    async function doLogin(baseUrl) {
      const body = new URLSearchParams({
        username: userEl.value.trim(),
        password: passEl.value,
      });
      const r = await fetch(baseUrl + "/api/auth/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded",
          "X-ModZero-Source": "client",
        },
        body,
      });
      if (r.status === 403) {
        throw new Error("This account is not enabled for client app access. Please use an employee account.");
      }
      if (!r.ok) {
        const txt = await r.text().catch(() => "");
        throw new Error(`Login failed (HTTP ${r.status}) ${txt}`);
      }
      const data = await r.json();
      const me = await fetch(baseUrl + "/api/auth/me", {
        headers: { Authorization: `Bearer ${data.access_token}` },
      }).then((x) => (x.ok ? x.json() : null)).catch(() => null);
      return { token: data.access_token, user: me };
    }

    async function doEnroll(baseUrl) {
      const r = await fetch(baseUrl + "/api/connectors/enroll", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: tokenEl.value.trim() }),
      });
      if (!r.ok) {
        const txt = await r.text().catch(() => "");
        throw new Error(`Enrollment failed (HTTP ${r.status}) ${txt}`);
      }
      return await r.json();
    }

    testBtn.addEventListener("click", async () => {
      const base = normaliseUrl(urlEl.value);
      if (!base) { setStatus("err", "Please enter a server URL."); return; }
      busy(true, "Testing…");
      try {
        const h = await probeHealth(base);
        if (h.ok) setStatus("ok", `Reachable at <code>${h.url}</code>`);
        else setStatus("err", `Cannot reach server: ${h.error}`);
      } finally {
        busy(false);
      }
    });

    connectBtn.addEventListener("click", async () => {
      const base = normaliseUrl(urlEl.value);
      if (!base) { setStatus("err", "Please enter a server URL."); return; }
      busy(true, "Connecting…");
      try {
        setStatus("info", `Probing <code>${base}</code>…`);
        const h = await probeHealth(base);
        if (!h.ok) { setStatus("err", `Cannot reach server: ${h.error}`); return; }

        let credential;
        if (mode === "login") {
          setStatus("info", "Authenticating…");
          credential = await doLogin(base);
        } else {
          setStatus("info", "Exchanging enrollment token…");
          credential = { enrollment: await doEnroll(base) };
        }
        setStatus("ok", "Connected. Saving configuration…");
        const ok = await window.modzero.saveAndConnect({
          url: base,
          mode,
          credential,
        });
        if (!ok) setStatus("err", "Could not save configuration.");
      } catch (e) {
        setStatus("err", String(e.message || e));
      } finally {
        busy(false);
      }
    });

    // Pre-fill from existing config (if any)
    (async () => {
      const saved = await window.modzero.getConfig();
      if (saved && saved.url) urlEl.value = saved.url;
      if (saved && saved.lastUser) userEl.value = saved.lastUser;
    })();
  </script>
</body>
</html>
